<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="net.reactivated.Fprint"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="net.reactivated.Fprint.Manager"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="net.reactivated.Fprint.Device"/>
  </policy>

  <policy user="tapauthd">
    <allow own="net.reactivated.Fprint"/>
  </policy>

  <!-- Restrict method-call access to the tapauthd-clients group.
       GDM/KDE display managers run as root, which is allowed by the
       root policy above.  The logged-in user must be a member of
       tapauthd-clients for their session to trigger auth prompts. -->
  <policy group="tapauthd-clients">
    <allow send_destination="net.reactivated.Fprint"
           send_interface="net.reactivated.Fprint.Manager"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="net.reactivated.Fprint.Device"/>
  </policy>

  <!-- Everyone can inspect the bus and read properties (harmless). -->
  <policy context="default">
    <allow send_destination="net.reactivated.Fprint"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="net.reactivated.Fprint"
           send_interface="org.freedesktop.DBus.ObjectManager"/>
  </policy>
</busconfig>
