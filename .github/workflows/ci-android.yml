name: CI - Android

on:
  push:
    branches: [main]
    paths:
      - 'server-android/**'
      - 'shared/**'
      - 'proto/**'
      - 'Cargo.lock'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server-android/**'
      - 'shared/**'
      - 'proto/**'
      - 'Cargo.lock'
      - '.github/workflows/ci-android.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-android:
    name: Build Android Native Libraries and APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Gradle dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;30.0.14904198"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/30.0.14904198" >> "$GITHUB_ENV"

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Grant execute permission for gradlew
        run: chmod +x server-android/gradlew

      - name: Build native libraries (fail-fast)
        run: cd server-android && ./gradlew cargoBuild

      - name: Free disk space for emulator
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: Enable KVM (for Android Emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-36

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run JNI instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd server-android && ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: instrumentation-test-results
          path: server-android/app/build/reports/androidTests/
          retention-days: 7

      - name: Build Android APK (Debug)
        run: cd server-android && ./gradlew assembleDebug --stacktrace

      - name: Check Kotlin formatting with Spotless
        run: cd server-android && ./gradlew spotlessCheck

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: tapauth-debug-apk
          path: server-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload native libraries artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-libraries
          path: server-android/app/src/main/jniLibs/
          retention-days: 30
