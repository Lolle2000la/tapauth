name: Production Release Engine

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-fedora-copr:
    name: Fedora COPR Build Delivery
    runs-on: ubuntu-latest
    environment: release
    if: ${{ !github.event.release.prerelease }}
    steps:
      - name: Checkout Source Context
        uses: actions/checkout@v4

      - name: Initialize System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm python3-pip

      - name: Extract Dynamic Version Context
        id: version_vars
        run: |
          CLEAN_VER="${GITHUB_REF_NAME#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_OUTPUT

      - name: Validate COPR Authentication Token
        run: |
          mkdir -p ~/.config
          echo "${{ secrets.COPR_CONFIG }}" > ~/.config/copr
          chmod 600 ~/.config/copr
          pip install copr-cli
          if ! copr-cli whoami; then
            echo "::error:: COPR authentication failed — token may be expired or invalid."
            exit 1
          fi

      - name: Build and Transmit Source RPM (SRPM)
        run: |
          mkdir -p rpmbuild/{SOURCES,SRPMS,SPECS,BUILD}
          cp packaging/tapauth.spec rpmbuild/SPECS/tapauth.spec

          # Hardcode the release version into the spec so COPR's SRPM
          # rebuild sees it; the conditional pkgversion macro doesn't
          # survive COPR's dist-git extraction.
          sed -i "s/%{?pkgversion}%{!?pkgversion:0.1.0}/${{ steps.version_vars.outputs.VERSION }}/g" rpmbuild/SPECS/tapauth.spec

          # Dynamically append changelog entries
          CURRENT_DATE=$(date +"%a %b %d %Y")
          echo -e "\n%changelog\n* $CURRENT_DATE Luca Auer <lolle2000.la+tapauth@gmail.com> - ${{ steps.version_vars.outputs.VERSION }}-1\n- Automated production release build for v${{ steps.version_vars.outputs.VERSION }}." >> rpmbuild/SPECS/tapauth.spec

          # Strip the ./ prefix before adding the versioned directory so
          # older tar (SUSE Leap 15.6) doesn't choke on tapauth-X.Y/./paths
          tar --transform "s|^\./|tapauth-${{ steps.version_vars.outputs.VERSION }}/|" -czf rpmbuild/SOURCES/tapauth-${{ steps.version_vars.outputs.VERSION }}.tar.gz --exclude=./rpmbuild --exclude=./.git --exclude=./target .
          rpmbuild -bs rpmbuild/SPECS/tapauth.spec --define "_topdir $(pwd)/rpmbuild"

          copr-cli build --nowait lolle2000la/tapauth rpmbuild/SRPMS/*.src.rpm

  release-ubuntu-ppa:
    name: Ubuntu Launchpad PPA Source Delivery
    runs-on: ubuntu-latest
    environment: release
    if: ${{ !github.event.release.prerelease }}
    env:
      DEBEMAIL: "lolle2000.la+tapauth@gmail.com"
      DEBFULLNAME: "Luca Auer"
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Checkout Source Context
        uses: actions/checkout@v4

      - name: Initialize System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput

      - name: Initialize Verified Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract Dynamic Version Context
        id: version_vars
        run: |
          CLEAN_VER="${GITHUB_REF_NAME#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_OUTPUT

      - name: Configure GPG Verification Keyring
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_FPR=$(gpg --with-colons --list-secret-keys --keyid-format LONG | grep '^sec:' | cut -d: -f5)
          echo "GPG_KEY_FPR=${GPG_KEY_FPR}" >> $GITHUB_ENV
          # Configure GPG for headless (non-TTY) signing
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

      - name: Construct Offline-Isolated Source Tarball (Vendor Sandbox)
        run: |
          mkdir -p .cargo
          if [ -f .cargo/config.toml ]; then
            cp .cargo/config.toml .cargo/config.toml.bak
            cargo vendor >> .cargo/config.toml
          else
            cargo vendor > .cargo/config.toml
          fi

      - name: Build Signed Debian Source Manifest Asset
        run: |
          VERSION="${{ steps.version_vars.outputs.VERSION }}"
          mkdir -p debian/source
          echo "3.0 (quilt)" > debian/source/format

          cat > debian/control <<EOF
          Source: tapauth
          Section: admin
          Priority: optional
          Maintainer: Luca Auer <lolle2000.la+tapauth@gmail.com>
          Build-Depends: debhelper-compat (= 13), cargo-1.91 | cargo (>= 1.85), rustc-1.91 | rustc (>= 1.85), protobuf-compiler, libdbus-1-dev, libsystemd-dev, libpam0g-dev
          Standards-Version: 4.7.0

          Package: tapauth
          Architecture: any
          Depends: \${shlibs:Depends}, \${misc:Depends}
          Description: Local smartphone-based authentication framework
           A modern, privacy-preserving local-first authentication system
           using Rust PAM modules, systemd system daemons, and low-level
           communication links. Provides phone-based biometric
           verification for Linux desktop login, sudo, and polkit
           authentication via UDP and BLE transport layers.
          EOF

          cat > debian/rules <<EOF
          #!/usr/bin/make -f

          DEB_HOST_MULTIARCH ?= \$(shell dpkg-architecture -qDEB_HOST_MULTIARCH)
          # On jammy/noble, cargo-1.91 supplies /usr/bin/cargo-1.91 (not cargo).
          # On resolute, the default cargo >= 1.93 is fine as-is.
          CARGO := \$(shell which cargo-1.91 2>/dev/null || which cargo)
          RUSTC := \$(shell which rustc-1.91 2>/dev/null || which rustc)

          %:
          	dh \$@

          override_dh_clean:
          	# dh_clean deletes *.orig files by default, which breaks
          	# vendored crates that ship legitimate .orig assets.
          	# Exclude the entire vendor directory from cleanup.
          	dh_clean -Xvendor/

          override_dh_auto_build:
          	\$(CARGO) build --workspace --release --offline --frozen

          override_dh_auto_install:
          	mkdir -p debian/tapauth/usr/bin
          	mkdir -p debian/tapauth/lib/\$(DEB_HOST_MULTIARCH)/security
          	mkdir -p debian/tapauth/lib/systemd/system
          	mkdir -p debian/tapauth/usr/lib/sysusers.d
          	mkdir -p debian/tapauth/usr/lib/tmpfiles.d
          	mkdir -p debian/tapauth/usr/share/pam-configs
          	mkdir -p debian/tapauth/usr/share/applications
          	mkdir -p debian/tapauth/usr/share/icons/hicolor/scalable/apps
          	mkdir -p debian/tapauth/usr/share/polkit-1/actions
          	
          	cp target/release/tapauthd debian/tapauth/usr/bin/
          	cp target/release/tapauth-config debian/tapauth/usr/bin/
          	cp target/release/libclient_pam.so debian/tapauth/lib/\$(DEB_HOST_MULTIARCH)/security/pam_tapauth.so
          	cp systemd/tapauthd.service debian/tapauth/lib/systemd/system/
          	cp systemd/tapauthd.socket debian/tapauth/lib/systemd/system/
          	cp packaging/sysusers.conf debian/tapauth/usr/lib/sysusers.d/tapauth.conf
          	cp packaging/tmpfiles.conf debian/tapauth/usr/lib/tmpfiles.d/tapauth.conf
          	cp packaging/debian.pam-config debian/tapauth/usr/share/pam-configs/tapauth
          	cp client-config-gui/tapauth-config.desktop debian/tapauth/usr/share/applications/
          	cp client-config-gui/assets/tapauth-config.svg debian/tapauth/usr/share/icons/hicolor/scalable/apps/
          	cp client-config-gui/dev.rourunisen.tapauth.policy debian/tapauth/usr/share/polkit-1/actions/
          EOF
          chmod +x debian/rules

          # Include safety guards and mandatory #DEBHELPER# hooks for system service registrations
          cat > debian/postinst <<EOF
          #!/bin/sh
          set -e
          if [ "\$1" = "configure" ]; then
          	systemd-sysusers /usr/lib/sysusers.d/tapauth.conf
          	systemd-tmpfiles --create /usr/lib/tmpfiles.d/tapauth.conf
          	if command -v pam-auth-update >/dev/null 2>&1; then
          		pam-auth-update --package
          	fi
          fi
          #DEBHELPER#
          exit 0
          EOF

          cat > debian/postrm <<EOF
          #!/bin/sh
          set -e
          if [ "\$1" = "remove" ] || [ "\$1" = "purge" ]; then
          	if command -v pam-auth-update >/dev/null 2>&1; then
          		pam-auth-update --package
          	fi
          fi
          if [ "\$1" = "purge" ]; then
          	systemd-tmpfiles --remove /usr/lib/tmpfiles.d/tapauth.conf || true
          	systemd-sysusers --remove /usr/lib/sysusers.d/tapauth.conf || true
          fi
          #DEBHELPER#
          exit 0
          EOF
          chmod +x debian/postinst debian/postrm

          # Build and upload per target series so Launchpad rebuilds for each
          PARENT_DIR=$(basename $(pwd))
          cd ..
          tar --exclude="${PARENT_DIR}/debian" --exclude="${PARENT_DIR}/.git" --exclude="${PARENT_DIR}/target" --exclude="${PARENT_DIR}/rpmbuild" -czf tapauth_${VERSION}.orig.tar.gz "${PARENT_DIR}" --transform "s/^${PARENT_DIR}/tapauth-${VERSION}/"

          # dpkg-buildpackage requires the working directory to match the source-version scheme
          ln -s "${PARENT_DIR}" "tapauth-${VERSION}"
          cd "tapauth-${VERSION}"

          # Use rustc-1.91/cargo-1.91 backports on older series.
          ACTIVE_SERIES="jammy noble resolute"
          echo "Targeting Ubuntu series: ${ACTIVE_SERIES}"

          FIRST=1
          FIRST_UPLOAD_DONE=0
          for SERIES in ${ACTIVE_SERIES}; do
            rm -f debian/changelog
            dch --create --package tapauth -v "${VERSION}-1~ppa1~${SERIES}1" --distribution "${SERIES}" "Automated production packaging update."
            dpkg-buildpackage -S -us -uc -d

            # The orig tarball is identical across series — Launchpad
            # rejects duplicate uploads, so strip it before signing
            if [ "${FIRST}" != "1" ]; then
              sed -i '/\.orig\.tar\.gz/d' ../tapauth_${VERSION}-1~ppa1~${SERIES}1_source.changes
            fi
            FIRST=0

            GPG_ARGS="--batch --pinentry-mode loopback --yes --no-tty"
            if [ -n "${GPG_PASSPHRASE:-}" ]; then
              printf '%s' "${GPG_PASSPHRASE}" > /tmp/gpg-passphrase
              chmod 600 /tmp/gpg-passphrase
              GPG_ARGS="${GPG_ARGS} --passphrase-file /tmp/gpg-passphrase"
            fi
            debsign -p "gpg ${GPG_ARGS}" -k "${GPG_KEY_FPR}" ../tapauth_${VERSION}-1~ppa1~${SERIES}1_source.changes
            rm -f /tmp/gpg-passphrase

            # dput can receive 550 internal-server errors when
            # consecutive uploads for different series arrive before
            # Launchpad's queue has ingested the first one. Wait 90s
            # before first attempt on any series after the first, then
            # retry with escalating backoff.
            if [ "${FIRST_UPLOAD_DONE}" = "1" ]; then
              sleep 90
            fi
            for ATTEMPT in 1 2 3; do
              if dput ppa:lolle2000la/tapauth ../tapauth_${VERSION}-1~ppa1~${SERIES}1_source.changes; then
                echo "dput succeeded on attempt ${ATTEMPT}"
                break
              fi
              echo "dput failed on attempt ${ATTEMPT} (exit $?), retrying..."
              sleep $((2 ** (3 + ATTEMPT)))
            done
            FIRST_UPLOAD_DONE=1
          done

  release-arch-aur:
    name: Arch User Repository (AUR) Sync
    runs-on: ubuntu-latest
    environment: release
    if: ${{ !github.event.release.prerelease }}
    steps:
      - name: Checkout Source Context
        uses: actions/checkout@v4

      - name: Extract Dynamic Version Context
        id: version_vars
        run: |
          CLEAN_VER="${GITHUB_REF_NAME#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_OUTPUT

      - name: Fetch Remote Release Tarball Checksum
        id: calc_sha
        run: |
          TARBALL_URL="https://github.com/lolle2000la/tapauth/archive/refs/tags/v${{ steps.version_vars.outputs.VERSION }}.tar.gz"
          curl -sL "$TARBALL_URL" -o release.tar.gz
          SHA256_HASH=$(sha256sum release.tar.gz | cut -d' ' -f1)
          echo "SHA256=${SHA256_HASH}" >> $GITHUB_OUTPUT
          echo "Release archive verified hash: ${SHA256_HASH}"

      - name: Synchronize and Push Metadata Changes to the AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_aur

          git config --global user.name "AUR Deployment Pipeline"
          git config --global user.email "lolle2000.la+tapauth@gmail.com"

          git clone aur@aur.archlinux.org:tapauth.git aur-repo
          cd aur-repo

          # Added aarch64 to arch layout matrix, removed self-conflicting references
          cat > PKGBUILD <<EOF
          pkgname=tapauth
          pkgver=${{ steps.version_vars.outputs.VERSION }}
          pkgrel=1
          pkgdesc="Local smartphone-based authentication framework engine"
          arch=('x86_64' 'aarch64')
          url="https://github.com/lolle2000la/tapauth"
          license=('Apache-2.0')
          depends=('dbus' 'pam')
          makedepends=('cargo' 'rust' 'protobuf')
          source=("\$pkgname-\$pkgver.tar.gz::https://github.com/lolle2000la/tapauth/archive/refs/tags/v\$pkgver.tar.gz")
          sha256sums=('${{ steps.calc_sha.outputs.SHA256 }}')

          prepare() {
            cd "\$srcdir/\$pkgname-\$pkgver"
            export CARGO_HOME="\${srcdir}/cargo-home"
            cargo fetch --locked --target "\$CARCH-unknown-linux-gnu"
          }

          build() {
            cd "\$srcdir/\$pkgname-\$pkgver"
            export CARGO_HOME="\${srcdir}/cargo-home"
            export CARGO_PROFILE_RELEASE_STRIP=true
            cargo build --frozen --workspace --release
          }

          package() {
            cd "\$srcdir/\$pkgname-\$pkgver"
            install -Dm0755 target/release/tapauthd "\$pkgdir/usr/bin/tapauthd"
            install -Dm0755 target/release/tapauth-config "\$pkgdir/usr/bin/tapauth-config"
            install -Dm0755 target/release/libclient_pam.so "\$pkgdir/usr/lib/security/pam_tapauth.so"
            install -Dm0644 systemd/tapauthd.service "\$pkgdir/usr/lib/systemd/system/tapauthd.service"
            install -Dm0644 systemd/tapauthd.socket "\$pkgdir/usr/lib/systemd/system/tapauthd.socket"
            install -Dm0644 packaging/sysusers.conf "\$pkgdir/usr/lib/sysusers.d/tapauth.conf"
            install -Dm0644 packaging/tmpfiles.conf "\$pkgdir/usr/lib/tmpfiles.d/tapauth.conf"
            install -Dm0644 client-config-gui/tapauth-config.desktop "\$pkgdir/usr/share/applications/tapauth-config.desktop"
            install -Dm0644 client-config-gui/assets/tapauth-config.svg "\$pkgdir/usr/share/icons/hicolor/scalable/apps/tapauth-config.svg"
            install -Dm0644 client-config-gui/dev.rourunisen.tapauth.policy "\$pkgdir/usr/share/polkit-1/actions/dev.rourunisen.tapauth.policy"
            install -Dm0644 LICENSE "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          EOF

          cat > .SRCINFO <<EOF
          pkgbase = tapauth
          	pkgdesc = Local smartphone-based authentication framework engine
          	pkgver = ${{ steps.version_vars.outputs.VERSION }}
          	pkgrel = 1
          	url = https://github.com/lolle2000la/tapauth
          	arch = x86_64
          	arch = aarch64
          	license = Apache-2.0
          	makedepends = cargo
          	makedepends = rust
          	makedepends = protobuf
          	depends = dbus
          	depends = pam
          	source = tapauth-${{ steps.version_vars.outputs.VERSION }}.tar.gz::https://github.com/lolle2000la/tapauth/archive/refs/tags/v${{ steps.version_vars.outputs.VERSION }}.tar.gz
          	sha256sums = ${{ steps.calc_sha.outputs.SHA256 }}

          pkgname = tapauth
          EOF

          git add PKGBUILD .SRCINFO
          git commit -m "Automated production sync target version: v${{ steps.version_vars.outputs.VERSION }}"
          git push origin master

  release-android-apk:
    name: Android APK Build and Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout Source Context
        uses: actions/checkout@v4

      - name: Extract Dynamic Version Context
        id: version_vars
        run: |
          CLEAN_VER="${GITHUB_REF_NAME#v}"
          echo "VERSION=${CLEAN_VER}" >> $GITHUB_OUTPUT
          # Derive monotonically increasing versionCode from semver;
          # strip prerelease suffix so beta tags produce a valid integer
          SEMVER="${CLEAN_VER%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('server-android/**/*.gradle*', 'server-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-release-

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;30.0.14904198"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/30.0.14904198" >> "$GITHUB_ENV"

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Grant execute permission for gradlew
        run: chmod +x server-android/gradlew

      - name: Decode release keystore
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_B64:-}" ]; then
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > server-android/release.keystore
          else
            echo "::warning:: ANDROID_KEYSTORE_B64 not set — APK will be unsigned"
          fi
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Build release APK
        run: |
          export VERSION_NAME="${{ steps.version_vars.outputs.VERSION }}"
          export VERSION_CODE="${{ steps.version_vars.outputs.VERSION_CODE }}"
          cd server-android && ./gradlew assembleRelease

      - name: Upload APK to GitHub Release
        run: |
          APK_PATH=$(find server-android/app/build/outputs/apk/release -name "*.apk" -not -name "*unsigned*" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH="server-android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          APK_NAME="tapauth-v${{ steps.version_vars.outputs.VERSION }}.apk"
          cp "$APK_PATH" "$APK_NAME"
          gh release upload "${{ github.ref_name }}" "$APK_NAME" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
