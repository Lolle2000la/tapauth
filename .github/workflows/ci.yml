name: CI - Rust

on:
  push:
    branches: [main]
    paths:
      - 'shared/**'
      - 'tapauthd/**'
      - 'client-pam/**'
      - 'client-config-gui/**'
      - 'proto/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'shared/**'
      - 'tapauthd/**'
      - 'client-pam/**'
      - 'client-config-gui/**'
      - 'proto/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build and Test All Modules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            libpam0g-dev \
            protobuf-compiler \
            libgtk-4-dev \
            build-essential

      - name: Build shared library (default features)
        run: cargo build --manifest-path shared/Cargo.toml --verbose

      - name: Build shared library (with jni feature)
        run: cargo build --manifest-path shared/Cargo.toml --features jni --verbose

      - name: "Build tapauthd (default: BLE + firewall)"
        run: cargo build --manifest-path tapauthd/Cargo.toml --verbose

      - name: "Build tapauthd (no BLE, firewall only)"
        run: cargo build --manifest-path tapauthd/Cargo.toml --no-default-features --features firewall --verbose

      - name: "Build client PAM module"
        run: cargo build --manifest-path client-pam/Cargo.toml --verbose

      - name: "Build client PAM module (no features)"
        run: cargo build --manifest-path client-pam/Cargo.toml --no-default-features --verbose

      - name: Build client config GUI
        run: cargo build --manifest-path client-config-gui/Cargo.toml --verbose

      - name: Build all workspace members
        run: cargo build --workspace --verbose

      - name: Run tests for shared library
        run: cargo test --manifest-path shared/Cargo.toml --verbose

      - name: Run tests for shared library (with jni feature)
        run: cargo test --manifest-path shared/Cargo.toml --features jni --verbose

      - name: Run tests for client PAM module
        run: cargo test --manifest-path client-pam/Cargo.toml --verbose

      - name: Run tests for client config GUI
        run: cargo test --manifest-path client-config-gui/Cargo.toml --verbose

      - name: Run all workspace tests
        run: cargo test --workspace --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
