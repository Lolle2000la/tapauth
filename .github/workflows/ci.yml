name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    build-and-test:
        name: Build and Test All Modules
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/registry
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-registry-

            - name: Cache cargo index
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/git
                  key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-git-

            - name: Cache cargo build
              uses: actions/cache@v4
              with:
                  path: target
                  key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-build-

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libdbus-1-dev \
                    pkg-config \
                    libpam0g-dev \
                    protobuf-compiler \
                    libgtk-4-dev \
                    build-essential

            - name: Build shared library (default features)
              run: cargo build --manifest-path shared/Cargo.toml --verbose

            - name: Build shared library (with jni feature)
              run: cargo build --manifest-path shared/Cargo.toml --features jni --verbose

            - name: Build BLE daemon
              run: cargo build --manifest-path ble-daemon/Cargo.toml --verbose

            - name: Build client PAM module
              run: cargo build --manifest-path client-pam/Cargo.toml --verbose

            - name: Build client config GUI
              run: cargo build --manifest-path client-config-gui/Cargo.toml --verbose

            - name: Build all workspace members
              run: cargo build --workspace --verbose

            - name: Run tests for shared library
              run: cargo test --manifest-path shared/Cargo.toml --verbose

            - name: Run tests for shared library (with jni feature)
              run: cargo test --manifest-path shared/Cargo.toml --features jni --verbose

            - name: Run tests for BLE daemon
              run: cargo test --manifest-path ble-daemon/Cargo.toml --verbose

            - name: Run tests for client PAM module
              run: cargo test --manifest-path client-pam/Cargo.toml --verbose

            - name: Run tests for client config GUI
              run: cargo test --manifest-path client-config-gui/Cargo.toml --verbose

            - name: Run all workspace tests
              run: cargo test --workspace --verbose

            - name: Check formatting
              run: cargo fmt --all -- --check

            - name: Run clippy
              run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    build-android:
        name: Build Android Native Libraries and APK
        runs-on: ubuntu-latest
        needs: build-and-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

            - name: Install cargo-ndk
              run: cargo install cargo-ndk

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/registry
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-registry-

            - name: Cache cargo index
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/git
                  key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-git-

            - name: Cache Android targets build
              uses: actions/cache@v4
              with:
                  path: target
                  key: ${{ runner.os }}-android-build-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-android-build-

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install Android NDK
              run: |
                  sdkmanager --install "ndk;26.1.10909125"
                  echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

            - name: Install protobuf compiler
              run: |
                  sudo apt-get update
                  sudo apt-get install -y protobuf-compiler

            - name: Build native libraries for Android
              run: |
                  chmod +x server-android/build-native.sh
                  ./server-android/build-native.sh

            - name: Cache Gradle dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Grant execute permission for gradlew
              run: chmod +x server-android/gradlew

            - name: Build Android APK (Debug)
              run: |
                  cd server-android
                  ./gradlew assembleDebug --stacktrace

            - name: Check Kotlin formatting with Spotless
              run: |
                  cd server-android
                  ./gradlew spotlessCheck

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: tapauth-debug-apk
                  path: server-android/app/build/outputs/apk/debug/*.apk
                  retention-days: 30

            - name: Upload native libraries artifact
              uses: actions/upload-artifact@v4
              with:
                  name: native-libraries
                  path: server-android/app/src/main/jniLibs/
                  retention-days: 30
