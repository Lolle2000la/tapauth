<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the tapauth-ble-daemon to own the BLE service name -->
  <policy user="root">
    <allow own="dev.rourunisen.tapauth.BLE"/>
  </policy>

  <!-- Only allow root to call methods on the BLE service -->
  <!-- PAM modules run as root, so this is sufficient for authentication -->
  <policy user="root">
    <allow send_destination="dev.rourunisen.tapauth.BLE"/>
    <allow receive_sender="dev.rourunisen.tapauth.BLE"/>
  </policy>

  <!-- Deny everyone else -->
  <policy context="default">
    <deny send_destination="dev.rourunisen.tapauth.BLE"/>
  </policy>
</busconfig>
