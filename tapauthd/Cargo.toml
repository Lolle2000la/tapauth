[package]
name = "tapauthd"
version = "0.1.0"
edition = "2021"

[dependencies]
shared = { path = "../shared" }
prost = { workspace = true }
bytes = "1.7"
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tracing-appender = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "fs", "io-util", "signal", "sync"] }
getrandom = { workspace = true }
nix = { workspace = true }
socket2 = { workspace = true }
hex = { workspace = true }

# BLE support
bluer = { version = "0.17", features = ["bluetoothd"], optional = true }

[features]
default = ["ble"]
ble = ["bluer"]
fallback-socket = []  # Enable manual socket binding for development/testing (production uses systemd socket activation)

