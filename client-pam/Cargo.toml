[package]
name = "client-pam"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
shared = { workspace = true, features = ["dbus"] }

# BLE support via daemon (using async zbus)
zbus = { workspace = true, optional = true, features = ["tokio"] }

# Protocol buffers
prost.workspace = true

# TPM support
tss-esapi = { version = "8.0.0-alpha.1", optional = true }

# Networking
socket2 = "0.5"
if-addrs.workspace = true

# Async runtime
tokio.workspace = true

# Utilities
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
getrandom.workspace = true
hex.workspace = true

[features]
default = ["ble"]
ble = ["zbus"]
tpm = ["tss-esapi"]
