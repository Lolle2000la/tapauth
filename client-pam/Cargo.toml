[package]
name = "client-pam"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
shared = { path = "../shared", features = ["dbus"] }

# BLE support via daemon (using async zbus)
zbus = { version = "4.0", optional = true }

# Protocol buffers
prost = "0.13"

# TPM support
tss-esapi = { version = "7.6", optional = true }

# Networking
tokio = { version = "1.41", features = ["full"] }
socket2 = "0.5"

# Utilities
thiserror = "2.0"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
getrandom = "0.2"
hex = "0.4"

[features]
default = ["ble"]
ble = ["zbus"]
tpm = ["tss-esapi"]
