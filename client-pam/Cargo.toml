[package]
name = "client-pam"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
shared = { path = "../shared" }

# PAM interface
pam-bindings = "0.1"

# BLE support (optional due to dbus dependency requirements)
bluer = { version = "0.17", features = ["bluetoothd"], optional = true }
futures-util = { version = "0.3", optional = true }

# TPM support
tss-esapi = { version = "7.6", optional = true }

# Networking
tokio = { version = "1.41", features = ["full"] }
socket2 = "0.5"

# Utilities
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = "0.3"
getrandom = "0.2"
hex = "0.4"

[features]
default = []
ble = ["bluer", "futures-util"]
tpm = ["tss-esapi"]
