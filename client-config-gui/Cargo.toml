[package]
name = "client-config-gui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "tapauth-config"
path = "src/main.rs"

[dependencies]
shared = { path = "../shared" }

# GUI framework
iced = { version = "0.13", features = ["tokio", "qr_code", "image"] }

# QR code generation
qrcode = "0.14"

# Async runtime
tokio = { version = "1.41", features = ["full"] }

# Utilities
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
local-ip-address = "0.6"
hex = "0.4"

# Privilege escalation
sudo = "0.6"
