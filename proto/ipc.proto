syntax = "proto3";

package tapauth.ipc;

// ── Top-level IPC envelope ──
//
// New clients (admin GUI) wrap all messages in IpcEnvelope so message-type
// disambiguation is unambiguous.  Legacy PAM clients send PamAuthenticateRequest
// and PamCancelRequest directly for backward compatibility; the daemon falls
// back to legacy decode when the envelope does not match.
message IpcEnvelope {
  oneof msg {
    PamAuthenticateRequest pam_authenticate = 10;
    PamCancelRequest pam_cancel = 11;
    AdminRequest admin_request = 20;
  }
}

// Outcome of a PAM authentication attempt
enum PamOutcome {
  SUCCESS = 0;   // Authentication granted
  DENIED = 1;    // Explicitly denied by a device/server
  TIMEOUT = 2;   // No response within session timeout
  IGNORE = 3;    // User chose to skip (e.g., TTY Enter)
  ERROR = 4;     // Internal or transport error
}

// Request to start an authentication flow
message PamAuthenticateRequest {
  string username = 1;       // Target local account
  bool tty_present = 2;      // Whether PAM session has an interactive TTY
  uint32 timeout_seconds = 3; // Optional override; 0 => daemon default
  string request_id = 4;     // Client-generated unique id for cancel correlation
}

// Request to cancel a running authentication flow
message PamCancelRequest {
  string reason = 1;         // Optional human-readable reason (e.g., "tty-skip")
  string request_id = 2;     // Target authenticate request id
}

// Final result of an authentication flow
message PamAuthenticateResponse {
  PamOutcome outcome = 1;
  string detail = 2;         // Optional detail for logs/UI
  bytes challenge = 3;       // The challenge generated by daemon (returned so PAM can correlate cancels with correct challenge)
}

// ── Administrative (configuration management) messages ──

enum AdminStatus {
  ADMIN_SUCCESS = 0;
  ADMIN_UNAUTHORIZED = 1;
  ADMIN_ERROR = 2;
}

message PairedServerInfo {
  string name = 1;
  string public_key = 2;
  repeated string allowed_users = 3;
  string paired_at = 4;
}

message AdminRequest {
  oneof payload {
    GetServersRequest get_servers = 1;
    StartPairingRequest start_pairing = 2;
    WaitForPairingRequest wait_for_pairing = 3;
    CompletePairingRequest complete_pairing = 4;
    RemoveDeviceRequest remove_device = 5;
    RotateCskRequest rotate_csk = 6;
    SaveConfigRequest save_config = 7;
    RecoverTpmRequest recover_tpm = 8;
    GetConfigRequest get_config = 9;
  }
}

message GetServersRequest {}
message StartPairingRequest {}
message WaitForPairingRequest { uint32 port = 1; }
message CompletePairingRequest { uint32 port = 1; }
message RemoveDeviceRequest { string public_key = 1; }
message RotateCskRequest {}
message SaveConfigRequest { string hostname = 1; uint32 udp_port = 2; }
message RecoverTpmRequest {}
message GetConfigRequest {}

message AdminResponse {
  AdminStatus status = 1;
  string error_message = 2;
  oneof payload {
    GetServersResponse get_servers = 3;
    StartPairingResponse start_pairing = 4;
    WaitForPairingResponse wait_for_pairing = 5;
    CompletePairingResponse complete_pairing = 6;
    GetConfigResponse get_config = 7;
  }
}

message GetServersResponse { repeated PairedServerInfo servers = 1; }
message StartPairingResponse { string url = 1; uint32 port = 2; }
message WaitForPairingResponse { string sas_code = 1; uint32 port = 2; }
message CompletePairingResponse { string server_hex = 1; }
message GetConfigResponse { string hostname = 1; uint32 udp_port = 2; }
