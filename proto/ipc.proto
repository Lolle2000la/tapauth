syntax = "proto3";

package tapauth.ipc;

// Outcome of a PAM authentication attempt
enum PamOutcome {
  SUCCESS = 0;   // Authentication granted
  DENIED = 1;    // Explicitly denied by a device/server
  TIMEOUT = 2;   // No response within session timeout
  IGNORE = 3;    // User chose to skip (e.g., TTY Enter)
  ERROR = 4;     // Internal or transport error
}

// Request to start an authentication flow
message PamAuthenticateRequest {
  string username = 1;       // Target local account
  bool tty_present = 2;      // Whether PAM session has an interactive TTY
  uint32 timeout_seconds = 3; // Optional override; 0 => daemon default
  string request_id = 4;     // Client-generated unique id for cancel correlation
}

// Request to cancel a running authentication flow
message PamCancelRequest {
  string reason = 1;         // Optional human-readable reason (e.g., "tty-skip")
  string request_id = 2;     // Target authenticate request id
}

// Final result of an authentication flow
message PamAuthenticateResponse {
  PamOutcome outcome = 1;
  string detail = 2;         // Optional detail for logs/UI
  bytes challenge = 3;       // The challenge generated by daemon (returned so PAM can correlate cancels with correct challenge)
}
